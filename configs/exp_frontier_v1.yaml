# Frontier V1: PatchTST + Solar Features + Fixed Physics Loss
# Pillar 1 target: Temp R² >= 0.75, DO R² >= 0.75
#
# Key changes vs high_accuracy.yaml:
#   - seq_len: 192 (48h context, captures multi-day thermal regimes)
#   - physics_warmup_epochs: 5 (physics engages from epoch 5 vs 45)
#   - do_loss_weight: 2.0 (upweight harder DO prediction)
#   - lambda_amplitude: 0.10 (penalize peak smoothing)
#   - No early stopping (run full 200 epochs so physics curriculum completes)
#
# Usage: python3 train.py --config configs/exp_frontier_v1.yaml --no-early-stop

project_root: "."

data:
  stations_json: "data/raw/stations.json"
  edges_csv: "data/raw/edges.csv"
  raw_dir: "data/raw"
  temperature_rdb: "water_temperature.rdb"
  dissolved_oxygen_rdb: "disolved_oxygen.rdb"
  temp_value_column: "334112_00010"
  do_value_column: "334113_00300"
  site_no: "02334500"
  forecast_site: "02334500"
  # Restrict to the original 3-site graph for this single-site experiment
  # (multi-site training is in exp_multisite_dam.yaml)
  sites: ["02334500", "02335000", "02335350"]
  resample_minutes: 15
  train_ratio: 0.70
  val_ratio: 0.15

meteo:
  enabled: true
  timezone: America/New_York
  filename: meteo.parquet

model:
  backbone: patchtst
  use_revin: true
  use_horizon_decoder: true
  use_physics_head: true
  use_ar_refinement: true
  use_residual_baseline: true
  use_local_conv: true
  gat_hidden: 128
  gat_heads: 4
  gat_dropout: 0.1
  patch_len: 16          # Larger patches for 192-step input
  patch_stride: 8
  d_model: 256           # Bigger model capacity
  n_heads: 8
  n_layers: 4            # One extra layer
  dropout: 0.10

forecast:
  seq_len: 192           # 48h context (was 96/24h)
  pred_len: 96           # 24h forecast horizon

physics:
  huber_delta: 0.8
  horizon_tau: 48.0
  physics_mode: soft
  physics_warmup_epochs: 5     # Engage physics from epoch 5 (was 45)
  physics_ramp_epochs: 50      # Complete ramp by epoch 55
  physics_max_scale: 0.20
  physics_horizon_steps: 32
  lambda_supersat: 0.15
  lambda_nonneg: 0.05
  lambda_solubility: 0.02
  lambda_reaeration: 0.03
  lambda_derivative: 0.04
  lambda_amplitude: 0.10       # NEW: penalize diurnal peak smoothing
  derivative_horizon: 24
  short_horizon_steps: 16
  short_horizon_weight: 2.0
  short_horizon_tail_weight: 0.75
  short_horizon_epoch_fraction: 0.4
  k_reaer: 0.4
  dt_hours: 0.25
  temp_loss_weight: 1.0        # NEW: equal weight on temperature
  do_loss_weight: 2.0          # NEW: double weight on DO

training:
  device: auto
  seed: 42
  batch_size: 32
  epochs: 200
  learning_rate: 0.0002
  weight_decay: 0.02
  grad_clip: 0.5
  lr_scheduler: cosine_warmup
  warmup_epochs: 10         # Short warmup then full cosine over 190 epochs
  warmup_start_factor: 0.10
  min_lr: 5.0e-6            # Floor at 5e-6 not 1e-7 — keeps gradient flow alive
  enable_early_stopping: false
  early_stopping_patience: 60
  min_epochs: 80
  use_ema_for_best: true
  ema_decay: 0.92
  monitor_key: val_phys_mean_rmse
  checkpoint_dir: "checkpoints/frontier_v1"
  log_dir: "logs/frontier_v1"
  save_last_every_epoch: true
  checkpoint_every_epochs: 10
  keep_last_n_epoch_checkpoints: 5
  eval_physical_every_epochs: 1
  skip_nan_batches: true
  max_consecutive_nan_epochs: 3
  num_workers: 0
  pin_memory: false

metrics:
  hypoxia_threshold_mg_l: 2.0
  hypoxia_sensitivity_mg_l: 3.0
  sudden_drop_mg_l: 1.0
  sudden_drop_steps: 4

explain:
  explain_hypoxia: false
  background_samples: 50
  figures_dir: "figures/frontier_v1"
  use_shap: false
