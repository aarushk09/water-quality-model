# Koopman+PatchTST Config — Physics Discovery via Koopman Operator
# Pillar 2 target: Temp R² >= 0.82, DO R² >= 0.83
# + Eigenspectrum analysis revealing dominant river modes
#
# Architecture: GAT → [PatchTST encoder ∥ Koopman encoder] → Horizon decoder
# The Koopman latent is injected into PatchTST patch embeddings via learned gate.
#
# Usage: python3 train.py --config configs/exp_koopman.yaml --no-early-stop
# Then:  python3 scripts/koopman_analysis.py --checkpoint checkpoints/koopman/best.pt

project_root: "."

data:
  stations_json: "data/raw/stations.json"
  edges_csv: "data/raw/edges.csv"
  raw_dir: "data/raw"
  temperature_rdb: "water_temperature.rdb"
  dissolved_oxygen_rdb: "disolved_oxygen.rdb"
  temp_value_column: "334112_00010"
  do_value_column: "334113_00300"
  site_no: "02334500"
  forecast_site: "02334500"
  # Restrict to original 3-site graph; dam-causality is in exp_multisite_dam.yaml
  sites: ["02334500", "02335000", "02335350"]
  resample_minutes: 15
  train_ratio: 0.70
  val_ratio: 0.15

meteo:
  enabled: true
  timezone: America/New_York
  filename: meteo.parquet

model:
  backbone: koopman_patchtst   # NEW: Koopman + PatchTST parallel branch
  use_revin: true
  use_horizon_decoder: true
  use_physics_head: true
  use_ar_refinement: true
  use_residual_baseline: true
  use_local_conv: true
  gat_hidden: 128
  gat_heads: 4
  gat_dropout: 0.1
  patch_len: 16
  patch_stride: 8
  d_model: 256
  n_heads: 8
  n_layers: 4
  dropout: 0.10
  # Koopman-specific parameters
  koopman_latent_dim: 32       # Dimension of Koopman observable space
  koopman_lambda_recon: 1.0    # Reconstruction fidelity weight
  koopman_lambda_pred: 1.0     # One-step linear prediction weight
  koopman_lambda_multi: 0.5    # Multi-step consistency weight
  koopman_lambda_spectral: 0.01  # Spectral radius regularization
  koopman_loss_weight: 0.10    # Scale of Koopman auxiliary loss vs. forecast loss
  koopman_warmup_epochs: 20    # Ramp Koopman weight 0→0.10 over first 20 epochs

forecast:
  seq_len: 192
  pred_len: 96

physics:
  huber_delta: 0.8
  horizon_tau: 48.0
  physics_mode: soft
  physics_warmup_epochs: 5
  physics_ramp_epochs: 50
  physics_max_scale: 0.20
  physics_horizon_steps: 32
  lambda_supersat: 0.15
  lambda_nonneg: 0.05
  lambda_solubility: 0.02
  lambda_reaeration: 0.03
  lambda_derivative: 0.04
  lambda_amplitude: 0.10
  derivative_horizon: 24
  short_horizon_steps: 16
  short_horizon_weight: 2.0
  short_horizon_tail_weight: 0.75
  short_horizon_epoch_fraction: 0.4
  k_reaer: 0.4
  dt_hours: 0.25
  temp_loss_weight: 1.0
  do_loss_weight: 2.0

training:
  device: auto
  seed: 42
  batch_size: 24             # Slightly smaller batch for larger model
  epochs: 200
  learning_rate: 0.00015     # Lower LR: Koopman encoder needs stable early training
  weight_decay: 0.02
  grad_clip: 0.5
  lr_scheduler: cosine_warmup
  warmup_epochs: 25
  warmup_start_factor: 0.05
  min_lr: 5.0e-8
  enable_early_stopping: false
  early_stopping_patience: 50
  min_epochs: 60
  use_ema_for_best: true
  ema_decay: 0.92
  monitor_key: val_phys_mean_rmse
  checkpoint_dir: "checkpoints/koopman"
  log_dir: "logs/koopman"
  save_last_every_epoch: true
  checkpoint_every_epochs: 10
  keep_last_n_epoch_checkpoints: 5
  eval_physical_every_epochs: 1
  skip_nan_batches: true
  max_consecutive_nan_epochs: 3
  num_workers: 0
  pin_memory: false

metrics:
  hypoxia_threshold_mg_l: 2.0
  hypoxia_sensitivity_mg_l: 3.0
  sudden_drop_mg_l: 1.0
  sudden_drop_steps: 4

explain:
  explain_hypoxia: false
  background_samples: 50
  figures_dir: "figures/koopman"
  use_shap: false
