# Multi-site Chattahoochee Dam-Causality Graph Config
# Pillar 4 target: Temp R² >= 0.85, DO R² >= 0.85
# Novel contribution: First explicit encoding of hydropower dam release causality
#
# Prerequisites:
#   1. Fetch multi-site data:
#      python3 scripts/fetch_chattahoochee_network.py
#   2. Train frontier base:
#      python3 train.py --config configs/exp_koopman.yaml --no-early-stop
#   3. Train multi-site model:
#      python3 train.py --config configs/exp_multisite_dam.yaml --no-early-stop
#
# Key novelty:
#   - 5-node directed graph with travel-time edge weights
#   - Site 02334430 (above dam) as upstream dam-signal node
#   - LagAwareGAT: shifts upstream history by learned travel time τ_{ij}
#   - Ablation: train with/without 02334430 to measure dam contribution

project_root: "."

data:
  stations_json: "data/raw/stations.json"
  edges_csv: "data/raw/edges.csv"
  raw_dir: "data/raw"
  temperature_rdb: "water_temperature.rdb"
  dissolved_oxygen_rdb: "disolved_oxygen.rdb"
  temp_value_column: "334112_00010"
  do_value_column: "334113_00300"
  site_no: "02334500"           # Primary forecast site (T+DO, Dec 2023+)
  forecast_site: "02334500"
  # Viable auxiliary sites in the dam-causality graph:
  #   02334430: T+DO+Q at ~25% (dam release signal, same date window as primary)
  #   02335000: T+Q at ~96% (Norcross, long record since 2010 — discharge proxy)
  # Sites 02334885 and 02335757 have no usable T/DO/Q data — excluded.
  additional_sites:
    - "02334430"                # Above Buford Dam — the dam release signal
    - "02335000"                # Norcross — rich discharge record (proxy for DO)
  resample_minutes: 15
  train_ratio: 0.70
  val_ratio: 0.15

meteo:
  enabled: true
  timezone: America/New_York
  filename: meteo.parquet

model:
  backbone: koopman_patchtst    # Full Koopman + PatchTST
  use_revin: true
  use_horizon_decoder: true
  use_physics_head: true
  use_ar_refinement: true
  use_residual_baseline: true
  use_local_conv: true
  gat_hidden: 128
  gat_heads: 4
  gat_dropout: 0.1
  patch_len: 16
  patch_stride: 8
  d_model: 256
  n_heads: 8
  n_layers: 4
  dropout: 0.10
  koopman_latent_dim: 32
  koopman_lambda_recon: 1.0
  koopman_lambda_pred: 1.0
  koopman_lambda_multi: 0.5
  koopman_lambda_spectral: 0.01
  koopman_loss_weight: 0.10

forecast:
  seq_len: 192
  pred_len: 96

physics:
  huber_delta: 0.8
  horizon_tau: 48.0
  physics_mode: soft
  physics_warmup_epochs: 5
  physics_ramp_epochs: 50
  physics_max_scale: 0.20
  physics_horizon_steps: 32
  lambda_supersat: 0.15
  lambda_nonneg: 0.05
  lambda_solubility: 0.02
  lambda_reaeration: 0.03
  lambda_derivative: 0.04
  lambda_amplitude: 0.10
  derivative_horizon: 24
  short_horizon_steps: 16
  short_horizon_weight: 2.0
  short_horizon_tail_weight: 0.75
  short_horizon_epoch_fraction: 0.4
  k_reaer: 0.4
  dt_hours: 0.25
  temp_loss_weight: 1.0
  do_loss_weight: 2.0

training:
  device: auto
  seed: 42
  batch_size: 16              # Smaller batch: 5 nodes × 192 steps is memory-intensive
  epochs: 200
  learning_rate: 0.00012
  weight_decay: 0.02
  grad_clip: 0.5
  lr_scheduler: cosine_warmup
  warmup_epochs: 30
  warmup_start_factor: 0.05
  min_lr: 5.0e-8
  enable_early_stopping: false
  early_stopping_patience: 60
  min_epochs: 60
  use_ema_for_best: true
  ema_decay: 0.92
  monitor_key: val_phys_mean_rmse
  checkpoint_dir: "checkpoints/multisite_dam"
  log_dir: "logs/multisite_dam"
  save_last_every_epoch: true
  checkpoint_every_epochs: 10
  keep_last_n_epoch_checkpoints: 5
  eval_physical_every_epochs: 1
  skip_nan_batches: true
  max_consecutive_nan_epochs: 3
  num_workers: 0
  pin_memory: false

metrics:
  hypoxia_threshold_mg_l: 2.0
  hypoxia_sensitivity_mg_l: 3.0
  sudden_drop_mg_l: 1.0
  sudden_drop_steps: 4

explain:
  explain_hypoxia: false
  background_samples: 50
  figures_dir: "figures/multisite_dam"
  use_shap: false
